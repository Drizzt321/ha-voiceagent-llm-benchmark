# Qwen3.5 — thinking mode disabled via chat-template-kwargs
# Run with: uv run scripts/run_benchmark.py configs/qwen3.5_nothink.yaml

assemble_tiers: true
base_dir: test_data
log_dir: logs/benchmark
warmup_samples: 5

instructions_file: "configs/qwen3.5_f7_refusal.txt"

server:
  host: darkllama
  ssh_user: drizzt
  llama_cpp_dir: ~/projects/llama.cpp/build
  port: 8080
  startup_timeout: 300

tiers:
  - small
  - medium

hardware_modes:
  - label: gpu
    ngl: 99

models:
  - hf_repo: "bartowski/Qwen_Qwen3.5-9B-GGUF"
    name: "qwen3.5-9b-nothink"
    quant: "Q3_K_M"
    ctx_sizes: [22000]
    extra_flags: ["--reasoning", "off"]
  - hf_repo: "bartowski/Qwen_Qwen3.5-4B-GGUF"
    name: "qwen3.5-4b-q5-nothink"
    quant: "Q5_K_M"
    ctx_sizes: [22000]
    extra_flags: ["--reasoning", "off"]
  - hf_repo: "bartowski/Qwen_Qwen3.5-4B-GGUF"
    name: "qwen3.5-4b-q8-nothink"
    quant: "Q8_0"
    ctx_sizes: [22000]
    extra_flags: ["--reasoning", "off"]
