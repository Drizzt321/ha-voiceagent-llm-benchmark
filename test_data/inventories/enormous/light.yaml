entities:
  # --- Light (130 entities) ---
  # Capability distribution targets: ~17% onoff-only, ~25% brightness, ~35% color_temp,
  #   ~18% RGB (hs/rgb), ~5% RGBW — realistic home mix from §8 of generation principles.
  #
  # Naming archaeology:
  #   - light.hue_kitchen_strip: brand-name identifier
  #   - light.smart_bulb_e7a2: generic auto-generated name, state: unavailable (actionable unavailable entity)
  #   - light.old_living_room_lamp: moved-but-never-renamed (area: guest_bedroom, name says "Living Room")
  #   - light.front_yard_christmas_lights: seasonal naming
  #
  # Duplicate friendly names (disambiguation scenarios):
  #   - "Floor Lamp" × 3: living_room, master_bedroom, guest_bedroom
  #   - "Vanity Light" × 3: bathroom, master_bathroom, upstairs_bathroom
  #   - "Nightlight" × 4: bathroom, master_bedroom, master_bathroom, nursery
  #   - "Desk Lamp" × 3: office, bedroom, guest_bedroom
  #
  # Unavailable actionable entity: light.smart_bulb_e7a2 (area: office)
  # Tests whether LLM refrains from issuing commands to an offline light.

  # =========================================================
  # KITCHEN (8 entities)
  # =========================================================
  - entity_id: light.kitchen_ceiling
    name: Kitchen Ceiling Light
    area: kitchen
    domain: light
    state: "on"
    attributes:
      supported_color_modes:
        - color_temp
      color_mode: color_temp
      min_color_temp_kelvin: 2700
      max_color_temp_kelvin: 5000
      supported_features: 0

  - entity_id: light.kitchen_under_cabinet_1
    name: Kitchen Under Cabinet Left
