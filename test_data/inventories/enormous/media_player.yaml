entities:
  # --- Media Player (18 entities) ---
  # All 6 non-transient states covered: off, on, idle, playing, paused, buffering.
  # Device types: TVs, soundbar, speakers, speaker groups, smart display, projector.
  #
  # Key disambiguation scenarios:
  #   - media_player.living_room_tv + media_player.living_room_projector: "watch a movie" ambiguity
  #   - media_player.living_room_tv + switch.living_room_tv_plug: cross-domain TV control
  #   - "TV" vs "Television": media_player.living_room_tv vs media_player.guest_bedroom_television
  #   - media_player.sonos_bathroom: brand-name identifier (Sonos)
  #   - media_player.whole_home_audio: speaker group entity (grouped control)
  #
  # supported_features bitmask (abbreviated — full values vary by integration):
  #   PAUSE=1, SEEK=2, VOLUME_SET=4, VOLUME_MUTE=8, PREVIOUS_TRACK=16, NEXT_TRACK=32,
  #   TURN_ON=128, TURN_OFF=256, PLAY_MEDIA=512, VOLUME_STEP=1024, SELECT_SOURCE=2048,
  #   STOP=4096, PLAY=16384, SHUFFLE_SET=32768, BROWSE_MEDIA=131072, REPEAT_SET=262144,
  #   GROUPING=524288

  # --- Living Room (3 entities) ---
  # TV + projector in same room: "watch a movie" / "turn on the TV" disambiguation.
  - entity_id: media_player.living_room_tv
    name: Living Room TV
    area: living_room
    domain: media_player
    state: playing
    attributes:
      supported_features: 458751
      source_list:
        - HDMI 1
        - HDMI 2
        - Netflix
        - YouTube
        - Disney+
      sound_mode_list:
        - Standard
        - Movie
        - Music
        - Sports

