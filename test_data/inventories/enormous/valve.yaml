entities:
  # --- Valve (3 entities) ---
  # Needed for HassSetPosition tool coverage (covers and valves share that tool path).
  # Also creates "turn off the water" disambiguation cluster with irrigation switches
  # and fountain switch.

  - entity_id: valve.water_main
    name: Water Main Shutoff
    area: garage
    domain: valve
    state: open
    attributes:
      device_class: water
      supported_features: 1

  - entity_id: valve.gas_main
    name: Gas Main Shutoff
    area: garage
    domain: valve
    state: closed
    attributes:
      device_class: gas
      supported_features: 1

  - entity_id: valve.back_yard_drip_zone
    name: Back Yard Drip Irrigation
    area: back_yard
    domain: valve
    state: closed
    attributes:
      device_class: water
      supported_features: 1
