entities:
  # --- Sensor (89 entities) ---
  # Most heterogeneous domain. Distribution per design principles:
  #   - temperature: 20+ (cheap Zigbee sensors everywhere, in °F except 3D printer in °C)
  #   - battery: 17+ (every wireless device)
  #   - humidity: 14+
  #   - power: 9+
  #   - moisture: 6 (soil moisture, companions to irrigation zones)
  #   - illuminance: 5+
  #   - energy: 4+
  #   - carbon_dioxide: 2
  #   - data_rate: 2
  #   - duration: 2 (washer/dryer cycle remaining)
  #   - long-tail one-offs: atmospheric_pressure, uv_index, wind_speed, sound_pressure, ph, signal_strength
  #
  # Meta-state: sensor.garage_temperature → state: unavailable (offline device)
  #
  # Tech hub (office) has 5 temperature sensors: room, server rack, 3D printer nozzle,
  # 3D printer bed, aquarium water. Creates hardest disambiguation challenge.
  # 3D printer temps in °C while all room temps in °F (unit system mixing).
  #
  # Companion groups:
  #   - 3D printer: switch.3d_printer + sensor.3d_printer_nozzle_temp + sensor.3d_printer_bed_temp + sensor.3d_printer_progress
  #   - Aquarium: switch.aquarium_pump + switch.aquarium_heater + light.aquarium_light + sensor.aquarium_water_temperature + sensor.aquarium_ph
  #   - Washer: binary_sensor.washer_running + sensor.washer_cycle_remaining + sensor.washer_power
  #   - Dryer: binary_sensor.dryer_running + sensor.dryer_cycle_remaining + sensor.dryer_power
  #   - EV charger: switch.ev_charger + binary_sensor.ev_charger_connected + sensor.ev_charger_energy + sensor.ev_charger_power
  #   - UPS: sensor.ups_battery_level + sensor.ups_load

