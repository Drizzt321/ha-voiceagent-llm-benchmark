entities:
  - entity_id: climate.kitchen_thermostat
    name: Kitchen Thermostat
    area: kitchen
    domain: climate
    state: heat_cool
    attributes:
      hvac_modes:
        - "off"
        - heat
        - cool
        - heat_cool
        - auto
        - fan_only
      preset_modes:
        - away
        - eco
        - comfort
      fan_modes:
        - auto
        - low
        - medium
        - high
      min_temp: 60
      max_temp: 85
      target_temp_step: 0.5

  - entity_id: climate.kitchen_wine_cooler
    name: Wine Cooler
    area: kitchen
    domain: climate
    state: cool
    attributes:
      hvac_modes:
        - "off"
        - cool
      min_temp: 44
      max_temp: 65
      target_temp_step: 1.0

  - entity_id: climate.office_thermostat
    name: Office Thermostat
    area: office
    domain: climate
    state: heat
    attributes:
      hvac_modes:
        - "off"
        - heat
        - cool
        - auto
      preset_modes:
        - away
        - eco
        - comfort
      fan_modes:
        - auto
        - low
        - high
      min_temp: 60
      max_temp: 80
      target_temp_step: 0.5

  - entity_id: climate.bedroom_thermostat
    name: Bedroom Thermostat
    area: bedroom
    domain: climate
    state: heat
    attributes:
      hvac_modes:
        - "off"
        - heat
      min_temp: 62
      max_temp: 78
      target_temp_step: 1.0
