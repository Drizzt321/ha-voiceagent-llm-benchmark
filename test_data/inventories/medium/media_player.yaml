      supported_features: 21517
      source_list:
        - HDMI ARC
        - Optical
        - Bluetooth
        - Streaming
      sound_mode_list:
        - Standard
        - Movie
        - Music
        - Night

  # --- Kitchen ---
  - entity_id: media_player.office_pc_speakers
    name: Office PC Speakers
    area: office
    domain: media_player
    state: paused
    attributes:
      supported_features: 21517

  # --- Bathroom (brand-name identifier: Sonos) ---
  - entity_id: media_player.bedroom_echo
    name: Bedroom Echo
    area: bedroom
    domain: media_player
    state: "on"
