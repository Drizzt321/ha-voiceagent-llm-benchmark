entities:
  - entity_id: media_player.living_room_tv
    name: Living Room TV
    area: living_room
    domain: media_player
    state: playing
    attributes:
      supported_features: 458751
      source_list:
        - HDMI 1
        - HDMI 2
        - Netflix
        - YouTube
        - Disney+
      sound_mode_list:
        - Standard
        - Movie
        - Music
        - Sports

  - entity_id: media_player.living_room_soundbar
